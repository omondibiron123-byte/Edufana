'quadratic':['To solve a quadratic equation ax² + bx + c = 0, use the quadratic formula:\n\n<b>x = (-b ± √(b² - 4ac)) / 2a</b>\n\n<b>Step-by-step example:</b> Solve 2x² + 5x - 3 = 0\n1. Identify: a=2, b=5, c=-3\n2. Calculate discriminant: b²-4ac = 25-4(2)(-3) = 25+24 = 49\n3. √49 = 7\n4. x = (-5 ± 7) / 4\n5. x = (-5+7)/4 = 0.5 OR x = (-5-7)/4 = -3\n\n<b>Answer: x = 0.5 or x = -3</b>\n\nThe discriminant tells you the nature of roots:\n• b²-4ac > 0 → two distinct real roots\n• b²-4ac = 0 → one repeated root\n• b²-4ac < 0 → no real roots (complex)'],
'simultaneous':['To solve simultaneous equations, use <b>substitution</b> or <b>elimination</b>:\n\n<b>Example:</b> Solve: 2x + y = 7 and x - y = 2\n\n<b>Elimination method:</b>\n1. Add both equations: 2x + y + x - y = 7 + 2 → 3x = 9 → x = 3\n2. Substitute x=3 into equation 1: 2(3) + y = 7 → y = 1\n<b>Answer: x = 3, y = 1</b>\n\n<b>Substitution method:</b>\n1. From eq 2: x = y + 2\n2. Put into eq 1: 2(y+2) + y = 7 → 3y + 4 = 7 → y = 1\n3. Then x = 1 + 2 = 3'],

'pythagoras':['<b>Pythagoras\' Theorem:</b> a² + b² = c² (where c is the hypotenuse)\n\n<b>Example:</b> A right triangle has sides 3cm and 4cm. Find the hypotenuse.\n1. c² = 3² + 4² = 9 + 16 = 25\n2. c = √25 = <b>5 cm</b>\n\n<b>Finding a shorter side:</b> If hypotenuse = 13 and one side = 5:\n1. a² = 13² - 5² = 169 - 25 = 144\n2. a = √144 = <b>12</b>\n\nPythagoras works ONLY in right-angled triangles. For other triangles, use the cosine rule: a² = b² + c² - 2bc·cos(A)'],
'algebra':['<b>Algebra Fundamentals:</b>\n\n<b>1. Expanding brackets:</b>\n• a(b + c) = ab + ac\n• (a + b)(c + d) = ac + ad + bc + bd\n• (a + b)² = a² + 2ab + b²\n• (a - b)² = a² - 2ab + b²\n• (a + b)(a - b) = a² - b²\n\n<b>2. Factoring:</b>\n• x² + 5x + 6 = (x + 2)(x + 3)\n• Look for two numbers that multiply to give c and add to give b\n\n<b>3. Solving linear equations:</b>\n• 3x + 7 = 22\n• 3x = 22 - 7 = 15\n• x = 15/3 = <b>5</b>\n\nAlways check your answer by substituting back into the original equation!'],
'percentage':['<b>Percentages:</b>\n\n<b>Finding a percentage of a number:</b>\n• 25% of 80 = (25/100) × 80 = <b>20</b>\n\n<b>Percentage increase:</b>\n• Formula: ((New - Old) / Old) × 100\n• Price went from 200 to 250: ((250-200)/200) × 100 = <b>25% increase</b>\n\n<b>Percentage decrease:</b>\n• Price went from 500 to 400: ((500-400)/500) × 100 = <b>20% decrease</b>\n\n<b>Finding the original price:</b>\n• After 20% discount, item costs 800. Original?\n• 80% of original = 800\n• Original = 800 / 0.8 = <b>KSh 1,000</b>'],
'calculus':['<b>Calculus — Differentiation & Integration:</b>\n\n<b>Differentiation</b> (finding gradient/rate of change):\n• If y = xⁿ, then dy/dx = nxⁿ⁻¹\n• y = x³ → dy/dx = 3x²\n• y = 5x² + 3x - 7 → dy/dx = 10x + 3\n\n<b>Uses:</b> Finding maximum/minimum points, velocity, acceleration\n• At turning points: dy/dx = 0\n• If d²y/dx² > 0 → minimum\n• If d²y/dx² < 0 → maximum\n\n<b>Integration</b> (reverse of differentiation):\n• ∫xⁿ dx = xⁿ⁺¹/(n+1) + C\n• ∫3x² dx = x³ + C\n\n<b>IB HL:</b> Also covers chain rule, product rule, quotient rule, integration by parts, and differential equations.'],
'probability':['<b>Probability:</b>\n\n<b>Basic formula:</b> P(event) = Favourable outcomes / Total outcomes\n\n<b>Example:</b> A bag has 3 red, 5 blue, 2 green balls. Find P(red).\n• P(red) = 3/10 = <b>0.3 or 30%</b>\n\n<b>Key rules:</b>\n• P(A or B) = P(A) + P(B) - P(A and B) [Addition rule]\n• P(A and B) = P(A) × P(B) [for independent events]\n• P(not A) = 1 - P(A)\n\n<b>Conditional probability:</b>\n• P(A|B) = P(A and B) / P(B)\n\n<b>Tree diagrams</b> help visualise multi-stage events.\n<b>KCSE tip:</b> Always check if events are independent or dependent — this determines whether you multiply or use conditional probability.'],
'vectors':['<b>Vectors:</b>\n\nA vector has both <b>magnitude</b> and <b>direction</b>.\n\n<b>Notation:</b> a = (x, y) or xi + yj\n\n<b>Operations:</b>\n• Addition: (a₁,a₂) + (b₁,b₂) = (a₁+b₁, a₂+b₂)\n• Scalar multiplication: k(a₁,a₂) = (ka₁, ka₂)\n• Magnitude: |a| = √(x² + y²)\n\n<b>Position vectors:</b>\n• If A = (2,3) and B = (5,7), then AB = B - A = (3,4)\n\n<b>Dot product:</b> a·b = a₁b₁ + a₂b₂ = |a||b|cos θ\n• If a·b = 0, vectors are perpendicular\n\n<b>KCSE:</b> Focus on 2D vectors, position vectors, midpoints, and ratios.\n<b>IB HL:</b> Also covers 3D vectors, cross product, vector equations of lines and planes.'],
'statistics':['<b>Statistics:</b>\n\n<b>Measures of central tendency:</b>\n• <b>Mean</b> = Sum of values / Number of values\n• <b>Median</b> = Middle value when arranged in order\n• <b>Mode</b> = Most frequent value\n\n<b>Measures of spread:</b>\n• <b>Range</b> = Highest - Lowest\n• <b>Variance</b> = Σ(x - x̄)² / n\n• <b>Standard deviation</b> = √Variance\n\n<b>Example:</b> Data: 3, 5, 7, 7, 9\n• Mean = (3+5+7+7+9)/5 = 31/5 = <b>6.2</b>\n• Median = <b>7</b> (middle value)\n• Mode = <b>7</b> (appears twice)\n• Range = 9-3 = <b>6</b>\n\n<b>For grouped data:</b> Use the assumed mean method or direct method with frequency tables.'],

// ── SCIENCES ──
'cell':['<b>Cell Biology:</b>\n\n<b>Animal cell structures:</b>\n• <b>Nucleus</b> — contains DNA, controls cell activities\n• <b>Cell membrane</b> — controls what enters/leaves\n• <b>Cytoplasm</b> — where chemical reactions occur\n• <b>Mitochondria</b> — powerhouse, produces ATP (energy)\n• <b>Ribosomes</b> — make proteins\n• <b>Endoplasmic reticulum</b> — transport network\n\n<b>Plant cells also have:</b>\n• <b>Cell wall</b> — rigid support (cellulose)\n• <b>Chloroplasts</b> — for photosynthesis\n• <b>Large vacuole</b> — stores water/sap\n\n<b>Key difference:</b> Animal cells have no cell wall, chloroplasts, or large central vacuole.\n\n<b>CBC/8-4-4:</b> Know cell organelles and their functions. Draw and label diagrams clearly in exams!'],
'photosynthesis':['<b>Photosynthesis:</b>\n\nThe process by which green plants make food using light energy.\n\n<b>Word equation:</b>\nCarbon dioxide + Water → (light energy) → Glucose + Oxygen\n\n<b>Chemical equation:</b>\n6CO₂ + 6H₂O → (light) → C₆H₁₂O₆ + 6O₂\n\n<b>Where it happens:</b> Chloroplasts (specifically in the chlorophyll)\n\n<b>Requirements:</b>\n1. Carbon dioxide (from air, through stomata)\n2. Water (from soil, through roots)\n3. Light energy (from the sun)\n4. Chlorophyll (green pigment)\n\n<b>Factors affecting rate:</b>\n• Light intensity (more light → faster, up to a point)\n• CO₂ concentration\n• Temperature (enzymes work best at ~25-35°C)\n• Water availability\n\n<b>KCSE tip:</b> Be able to describe experiments that test each factor using aquatic plants like Elodea.'],
'genetics':['<b>Genetics:</b>\n\n<b>Key terms:</b>\n• <b>Gene</b> — a section of DNA that codes for a protein\n• <b>Allele</b> — different forms of a gene (e.g., T for tall, t for short)\n• <b>Genotype</b> — genetic makeup (TT, Tt, tt)\n• <b>Phenotype</b> — physical appearance (tall/short)\n• <b>Dominant</b> — expressed when 1 or 2 copies present (T)\n• <b>Recessive</b> — only expressed when 2 copies present (tt)\n• <b>Homozygous</b> — TT or tt\n• <b>Heterozygous</b> — Tt\n\n<b>Punnett Square example:</b>\nCross Tt × Tt:\n\n     T    t\nT   TT   Tt\nt   Tt   tt\n\nRatio: 3 tall : 1 short (3:1)\n\n<b>KCSE:</b> Practice monohybrid and dihybrid crosses. Know Mendel\'s laws of segregation and independent assortment.'],
'atom':['<b>Atomic Structure:</b>\n\n<b>Parts of an atom:</b>\n• <b>Protons</b> (p⁺) — positive charge, in nucleus, mass = 1\n• <b>Neutrons</b> (n) — no charge, in nucleus, mass = 1\n• <b>Electrons</b> (e⁻) — negative charge, orbit nucleus, mass ≈ 0\n\n<b>Key numbers:</b>\n• <b>Atomic number (Z)</b> = number of protons = number of electrons\n• <b>Mass number (A)</b> = protons + neutrons\n• <b>Isotopes</b> = same element, different neutrons (e.g., C-12, C-14)\n\n<b>Electron configuration:</b>\n• Energy levels: 2, 8, 8, 18...\n• Sodium (Na, Z=11): 2, 8, 1\n• Chlorine (Cl, Z=17): 2, 8, 7\n\n<b>Chemical bonding:</b>\n• Ionic — transfer of electrons (metals + non-metals)\n• Covalent — sharing of electrons (non-metals)\n• Metallic — sea of delocalised electrons'],
'acids':['<b>Acids, Bases & Salts:</b>\n\n<b>Acids:</b> Produce H⁺ ions in water. pH < 7.\nExamples: HCl (hydrochloric), H₂SO₄ (sulphuric), HNO₃ (nitric), CH₃COOH (ethanoic/acetic)\n\n<b>Bases:</b> React with acids. Produce OH⁻ in water (alkalis). pH > 7.\nExamples: NaOH (sodium hydroxide), Ca(OH)₂ (calcium hydroxide), NH₃ (ammonia)\n\n<b>pH Scale:</b> 0 (strong acid) → 7 (neutral) → 14 (strong alkali)\n\n<b>Neutralisation:</b>\nAcid + Base → Salt + Water\nHCl + NaOH → NaCl + H₂O\n\n<b>Indicators:</b>\n• Litmus: Red in acid, Blue in alkali\n• Phenolphthalein: Colourless in acid, Pink in alkali\n• Universal indicator: Shows full pH range\n\n<b>KCSE:</b> Know preparation of salts, titration calculations, and properties of acids/bases.'],
'newton':['<b>Newton\'s Laws of Motion:</b>\n\n<b>1st Law (Inertia):</b> An object stays at rest or moves at constant velocity unless acted on by an external force.\n→ A ball on a table stays still until you push it.\n\n<b>2nd Law (F = ma):</b> Force = mass × acceleration.\n→ A 5kg object with acceleration 3m/s²: F = 5 × 3 = <b>15N</b>\n\n<b>3rd Law (Action-Reaction):</b> For every action, there is an equal and opposite reaction.\n→ You push a wall, the wall pushes you back equally.\n\n<b>Key formulas:</b>\n• v = u + at\n• s = ut + ½at²\n• v² = u² + 2as\n• F = ma\n• Weight = mg (g = 10 m/s²)\n\n<b>Example:</b> A car (mass 1000kg) accelerates from 0 to 20m/s in 10s.\n• a = (20-0)/10 = 2 m/s²\n• F = 1000 × 2 = <b>2000N</b>'],
'electricity':['<b>Electricity:</b>\n\n<b>Key concepts:</b>\n• <b>Current (I)</b> — flow of charge, measured in Amperes (A)\n• <b>Voltage (V)</b> — electrical pressure, measured in Volts (V)\n• <b>Resistance (R)</b> — opposition to current flow, measured in Ohms (Ω)\n\n<b>Ohm\'s Law: V = IR</b>\n• Example: V = 12V, R = 4Ω → I = V/R = 12/4 = <b>3A</b>\n\n<b>Power: P = IV = I²R = V²/R</b>\n• Example: I = 2A, V = 240V → P = 2 × 240 = <b>480W</b>\n\n<b>Energy: E = Pt = VIt</b>\n\n<b>Series circuits:</b> Same current, voltages add up, R_total = R₁ + R₂\n<b>Parallel circuits:</b> Same voltage, currents add up, 1/R = 1/R₁ + 1/R₂\n\n<b>KCSE:</b> Draw clear circuit diagrams. Know how to use ammeters (series) and voltmeters (parallel).'],
'organic':['<b>Organic Chemistry:</b>\n\n<b>Alkanes</b> (CₙH₂ₙ₊₂) — single bonds, saturated:\n• Methane CH₄, Ethane C₂H₆, Propane C₃H₈, Butane C₄H₁₀\n\n<b>Alkenes</b> (CₙH₂ₙ) — double bond, unsaturated:\n• Ethene C₂H₄, Propene C₃H₆\n• Test: Decolorises bromine water\n\n<b>Alkanols</b> (alcohols):\n• Methanol CH₃OH, Ethanol C₂H₅OH\n\n<b>Alkanoic acids</b> (carboxylic acids):\n• Methanoic acid HCOOH, Ethanoic acid CH₃COOH\n\n<b>Reactions:</b>\n• Combustion: Hydrocarbon + O₂ → CO₂ + H₂O\n• Esterification: Acid + Alcohol → Ester + Water\n\n<b>KCSE:</b> Know naming (IUPAC), structural formulas, functional groups, and isomerism. Practice drawing structures!'],
'evolution':['<b>Evolution & Natural Selection:</b>\n\n<b>Darwin\'s Theory of Natural Selection:</b>\n1. <b>Variation</b> exists within a population\n2. <b>Overproduction</b> — more offspring than can survive\n3. <b>Competition</b> for resources (food, mates, shelter)\n4. <b>Survival of the fittest</b> — those with advantageous traits survive\n5. <b>Reproduction</b> — survivors pass on traits to offspring\n6. Over time, the population <b>adapts</b>\n\n<b>Evidence for evolution:</b>\n• Fossil record\n• Comparative anatomy (homologous structures)\n• DNA/molecular biology\n• Biogeography\n• Embryology\n\n<b>Lamarck vs Darwin:</b>\n• Lamarck: Organisms acquire traits during lifetime (wrong)\n• Darwin: Traits are inherited through natural selection (correct)\n\n<b>IB:</b> Also covers speciation, Hardy-Weinberg equilibrium, and cladistics.'],

// ── LANGUAGES ──
'french':['<b>French Basics:</b>\n\n<b>Greetings:</b>\n• Bonjour — Hello/Good morning\n• Bonsoir — Good evening\n• Comment allez-vous? — How are you? (formal)\n• Comment ça va? — How are you? (informal)\n• Je m\'appelle... — My name is...\n• Merci beaucoup — Thank you very much\n\n<b>Present tense -ER verbs:</b>\nParler (to speak):\n• Je parle, Tu parles, Il/Elle parle\n• Nous parlons, Vous parlez, Ils/Elles parlent\n\n<b>Common verbs:</b>\n• Être (to be): je suis, tu es, il est, nous sommes, vous êtes, ils sont\n• Avoir (to have): j\'ai, tu as, il a, nous avons, vous avez, ils ont\n• Aller (to go): je vais, tu vas, il va, nous allons, vous allez, ils vont\n\n<b>Study tip:</b> Watch French movies with subtitles, listen to French music, and practice speaking daily — even 10 minutes helps!'],
'spanish':['<b>Spanish Basics:</b>\n\n<b>Greetings:</b>\n• Hola — Hello\n• Buenos días — Good morning\n• ¿Cómo estás? — How are you?\n• Me llamo... — My name is...\n• Mucho gusto — Nice to meet you\n• Gracias — Thank you\n\n<b>Present tense -AR verbs:</b>\nHablar (to speak):\n• Yo hablo, Tú hablas, Él/Ella habla\n• Nosotros hablamos, Vosotros habláis, Ellos hablan\n\n<b>Key verbs:</b>\n• Ser (to be — permanent): yo soy, tú eres, él es\n• Estar (to be — temporary): yo estoy, tú estás, él está\n• Tener (to have): yo tengo, tú tienes, él tiene\n• Ir (to go): yo voy, tú vas, él va\n\n<b>Numbers:</b> uno, dos, tres, cuatro, cinco, seis, siete, ocho, nueve, diez'],
'german':['<b>German Basics:</b>\n\n<b>Greetings:</b>\n• Hallo — Hello\n• Guten Morgen — Good morning\n• Wie geht es Ihnen? — How are you? (formal)\n• Ich heiße... — My name is...\n• Danke schön — Thank you\n\n<b>Key verbs:</b>\n• sein (to be): ich bin, du bist, er ist, wir sind, ihr seid, sie sind\n• haben (to have): ich habe, du hast, er hat, wir haben\n• gehen (to go): ich gehe, du gehst, er geht\n\n<b>German has 3 genders:</b> der (masculine), die (feminine), das (neuter)\n• der Mann (the man), die Frau (the woman), das Kind (the child)\n\n<b>Cases:</b> Nominative, Accusative, Dative, Genitive — each changes the article.\n\n<b>Tip:</b> German word order is strict: Verb is always in 2nd position in main clauses!'],
'mandarin':['<b>Mandarin Chinese Basics:</b>\n\n<b>Greetings:</b>\n• 你好 (Nǐ hǎo) — Hello\n• 谢谢 (Xièxiè) — Thank you\n• 我叫... (Wǒ jiào...) — My name is...\n• 你好吗? (Nǐ hǎo ma?) — How are you?\n• 再见 (Zàijiàn) — Goodbye\n\n<b>Tones (4 + neutral):</b>\n1. ā (flat) — mā = mother\n2. á (rising) — má = hemp\n3. ǎ (dip) — mǎ = horse\n4. à (falling) — mà = scold\n\n<b>Basic sentence structure:</b> Subject + Verb + Object (like English!)\n• 我是学生 (Wǒ shì xuéshēng) — I am a student\n• 我喜欢中文 (Wǒ xǐhuān zhōngwén) — I like Chinese\n\n<b>Numbers:</b> 一二三四五六七八九十 (yī èr sān sì wǔ liù qī bā jiǔ shí)'],
'arabic':['<b>Arabic Basics:</b>\n\n<b>Greetings:</b>\n• السلام عليكم (As-salāmu ʿalaykum) — Peace be upon you\n• مرحبا (Marḥabā) — Hello\n• شكراً (Shukran) — Thank you\n• اسمي... (Ismī...) — My name is...\n• كيف حالك؟ (Kayfa ḥālak?) — How are you?\n\n<b>Arabic alphabet:</b> 28 letters, written right-to-left\n• Letters change form based on position (initial, medial, final)\n\n<b>Key features:</b>\n• Root system: Most words built from 3-letter roots\n• Example: ك-ت-ب (k-t-b) → كتاب (book), كاتب (writer), مكتبة (library)\n\n<b>Tip:</b> Start with the alphabet and pronunciation. Practice writing daily — Arabic calligraphy is beautiful and helps memorisation!'],

// ── HUMANITIES ──
'history':['<b>History — Kenya & World:</b>\n\n<b>KCSE History Topics:</b>\n1. <b>Pre-colonial Kenya:</b> Communities (Bantu, Nilotes, Cushites), social organisation, migration patterns\n2. <b>Colonial period:</b> Scramble for Africa, Berlin Conference 1884, British colonial rule, settler economy\n3. <b>Nationalism:</b> Mau Mau uprising, Jomo Kenyatta, independence 1963\n4. <b>Post-independence:</b> Kenyatta era, Moi era, multiparty democracy\n5. <b>World History:</b> World War I & II causes, Cold War, decolonisation\n6. <b>Government:</b> Democracy, dictatorship, constitution, separation of powers\n\n<b>IB History:</b> Covers authoritarian states, causes of wars, Cold War, and rights movements in depth.\n\n<b>Study tip:</b> Make timelines! History is about chronology. Use key dates as anchors and build your knowledge around them.'],
'geography':['<b>Geography:</b>\n\n<b>KCSE Geography Topics:</b>\n1. <b>Physical Geography:</b>\n   • Internal land-forming processes (folding, faulting, vulcanicity, earthquakes)\n   • External processes (weathering, erosion, mass wasting)\n   • Weather & climate (factors, elements, climate regions)\n   • Vegetation (forests, grasslands, deserts)\n\n2. <b>Human Geography:</b>\n   • Population (distribution, growth, migration)\n   • Settlement (urban vs rural, urbanisation)\n   • Agriculture & industry\n   • Transport & trade\n   • Environmental conservation\n\n3. <b>Practical Geography:</b>\n   • Map reading (scale, contours, grid references)\n   • Photograph interpretation\n   • Field study techniques\n\n<b>KCSE tip:</b> Map work carries many marks. Practice reading contour maps, calculating distances, and identifying features!'],

// ── EXAMS & STUDY ──
'kcse':['<b>KCSE Exam Preparation Guide:</b>\n\n<b>Paper structure (most subjects):</b>\n• Paper 1: Short answers, 2 hours\n• Paper 2: Essay/structured questions, 2 hours\n• Paper 3: Practical (Sciences), 2-3 hours\n\n<b>Proven study strategy:</b>\n1. <b>3 months before:</b> Collect all past papers (2014-2024), organise by topic\n2. <b>2 months before:</b> Revise topic by topic, make summary notes\n3. <b>1 month before:</b> Solve past papers under timed conditions\n4. <b>2 weeks before:</b> Focus on weak areas, review marking schemes\n5. <b>1 week before:</b> Light revision, no new topics, rest well\n\n<b>Scoring tips:</b>\n• Read questions carefully — underline key words\n• Show ALL working in Maths/Sciences\n• Use diagrams where possible\n• Manage time — don\'t spend too long on one question\n• Attempt EVERY question\n\n<b>Grade calculation:</b> 12 points max per subject. A=12, A-=11, B+=10... E=1'],
'kcpe':['<b>KCPE Preparation:</b>\n\n<b>Subjects tested:</b>\n• English (Composition, Language, Comprehension)\n• Kiswahili (Insha, Lugha, Ufahamu)\n• Mathematics\n• Science\n• Social Studies & Religious Education\n\n<b>Tips for success:</b>\n1. Practice past papers daily (at least 1 full paper per week)\n2. Read widely — storybooks improve English and Kiswahili\n3. Master multiplication tables and mental arithmetic\n4. Understand Science concepts through experiments\n5. Study maps and current affairs for Social Studies\n\n<b>Time management:</b> Each paper has limited time. Practice finishing within the allocated time.'],
'study':['<b>Proven Study Techniques:</b>\n\n<b>1. Pomodoro Technique:</b>\n• Study for 25 minutes → 5-minute break → Repeat 4 times → 15-minute break\n\n<b>2. Active Recall:</b>\n• Close your book and try to write down what you remember\n• Much more effective than re-reading\n\n<b>3. Spaced Repetition:</b>\n• Review notes: Day 1, Day 3, Day 7, Day 14, Day 30\n• This builds long-term memory\n\n<b>4. Teach Someone:</b>\n• If you can explain it simply, you understand it\n• Form study groups and take turns teaching\n\n<b>5. Past Papers:</b>\n• The single best predictor of exam success\n• Practice under real exam conditions\n\n<b>6. Mind Maps:</b>\n• Visual summaries help connect ideas\n• Use colours and images\n\n<b>7. Sleep:</b>\n• Get 7-8 hours — your brain consolidates memory during sleep\n• Never sacrifice sleep for late-night cramming'],

// ── CAREER ──
'career':['<b>Career Planning Guide:</b>\n\n<b>Step 1: Self-Assessment</b>\nAsk yourself: What am I good at? What do I enjoy? What does the market need?\n\n<b>Step 2: Match Subjects to Careers</b>\n• Maths + Physics + Chemistry → Engineering, Architecture\n• Biology + Chemistry → Medicine, Pharmacy, Nursing\n• Maths + Business → Accounting, Finance, Economics\n• Languages + History → Law, Diplomacy, Journalism\n• Maths + Computer Studies → Software Engineering, Data Science\n• Art + Design → Architecture, Graphic Design, Fashion\n\n<b>Step 3: Research Requirements</b>\n• University cut-off points\n• Required KCSE/IB grades\n• Duration of study\n• Job market demand\n\n<b>Step 4: Build Skills Early</b>\n• Join clubs related to your career interest\n• Take online courses\n• Do internships/attachments\n• Build a portfolio\n\n<b>Top careers in Kenya (2024-2030):</b>\n1. Software Engineering (KSh 80K-600K+)\n2. Data Science (KSh 100K-700K+)\n3. Medicine (KSh 120K-800K+)\n4. Engineering (KSh 70K-500K+)\n5. Law (KSh 60K-700K+)'],
'university':['<b>University Course Selection:</b>\n\n<b>Based on your KCSE cluster subjects:</b>\n\n• <b>Engineering:</b> Maths A/A-, Physics A/A-, Chemistry B+\n  → University of Nairobi, JKUAT, Strathmore\n\n• <b>Medicine:</b> Biology A, Chemistry A, Maths/Physics B+\n  → UoN, Moi University, KEMRI\n\n• <b>Computer Science:</b> Maths A/A-, Physics B+\n  → Strathmore, UoN, Kenyatta University\n\n• <b>Law:</b> English A/A-, History/CRE B+\n  → UoN, Strathmore, Moi University\n\n• <b>Business:</b> Maths B+, English B+, Business B+\n  → Strathmore, USIU, KU\n\n<b>KUCCPS:</b> Kenya Universities and Colleges Central Placement Service. Apply based on your KCSE grades. Higher grades = more course choices.\n\n<b>IB students:</b> Can apply directly to international universities. A score of 35+ opens most universities worldwide.'],

// ── CBC ──
'cbc':['<b>CBC (Competency-Based Curriculum):</b>\n\n<b>Structure:</b>\n• Pre-Primary: PP1 & PP2 (ages 4-5)\n• Lower Primary: Grade 1-3 (ages 6-8)\n• Upper Primary: Grade 4-6 (ages 9-11)\n• Junior Secondary: Grade 7-9 (ages 12-14)\n• Senior School: Grade 10-12 (ages 15-17) — 3 pathways\n\n<b>7 Core Competencies:</b>\n1. Communication and Collaboration\n2. Critical Thinking and Problem Solving\n3. Creativity and Imagination\n4. Citizenship\n5. Digital Literacy\n6. Learning to Learn\n7. Self-Efficacy\n\n<b>Senior School Pathways:</b>\n• <b>STEM</b> — Science, Technology, Engineering, Mathematics\n• <b>Arts & Sports Science</b> — Creative arts, sports, hospitality\n• <b>Social Sciences</b> — Languages, humanities, business\n\n<b>Assessment:</b> Formative (ongoing) + Summative (exams). Focus is on practical skills, not just memorisation.\n\n<b>Key difference from 8-4-4:</b> CBC focuses on WHAT you can DO, not just what you know. Projects, portfolios, and practical work matter more.'],
'ib':['<b>International Baccalaureate (IB):</b>\n\n<b>IB Diploma Programme (ages 16-19):</b>\nStudents take 6 subjects across 6 groups:\n\n1. <b>Studies in Language & Literature</b> (English A)\n2. <b>Language Acquisition</b> (French, Spanish, etc.)\n3. <b>Individuals & Societies</b> (History, Geography, Economics, Psychology)\n4. <b>Sciences</b> (Biology, Chemistry, Physics, Computer Science)\n5. <b>Mathematics</b> (Analysis & Approaches or Applications & Interpretation)\n6. <b>The Arts</b> (Visual Arts, Music, Theatre) OR another from groups 1-5\n\n<b>3 subjects at Higher Level (HL)</b>, 3 at <b>Standard Level (SL)</b>\n\n<b>Plus the Core:</b>\n• <b>Theory of Knowledge (TOK)</b> — Critical thinking about knowledge itself\n• <b>Extended Essay (EE)</b> — 4,000-word independent research essay\n• <b>CAS</b> — Creativity, Activity, Service (extracurricular hours)\n\n<b>Grading:</b> Each subject scored 1-7. Maximum 45 points (42 from subjects + 3 from TOK/EE).\n• 24 points minimum to pass\n• 35+ = good\n• 40+ = excellent (top universities)\n• 45 = perfect score (very rare)\n\n<b>Recognition:</b> IB is accepted by universities in 150+ countries worldwide.']

  // ── SMART MATCHING ──
  answer(q){
    const ql=q.toLowerCase().replace(/[?!.,]/g,'');
    this.memory.push({role:'user',text:q});

    // 1. Direct keyword match from knowledge base
    let bestMatch=null,bestScore=0;
    for(const[key,vals] of Object.entries(this.kb)){
      const keywords=key.split('|');
      let score=0;
      for(const kw of keywords){if(ql.includes(kw))score+=kw.length}
      if(score>bestScore){bestScore=score;bestMatch=vals[Math.floor(Math.random()*vals.length)]}
    }
    if(bestMatch&&bestScore>=3){this.memory.push({role:'ai',text:bestMatch});return bestMatch}

    // 2. Multi-keyword pattern matching
    const patterns=[
      {keys:['solve','equation'],resp:this.kb['quadratic']||this.kb['algebra']},
      {keys:['what','is','cell'],resp:this.kb['cell']},
      {keys:['explain','photosynthesis'],resp:this.kb['photosynthesis']},
      {keys:['newton','law'],resp:this.kb['newton']},
      {keys:['how','calculate'],resp:this.kb['percentage']||this.kb['statistics']},
      {keys:['ohm','law'],resp:this.kb['electricity']},
      {keys:['dna','gene','inherit'],resp:this.kb['genetics']},
      {keys:['acid','base','ph'],resp:this.kb['acids']},
      {keys:['organic','alkane','alkene'],resp:this.kb['organic']},
      {keys:['darwin','natural','selection'],resp:this.kb['evolution']},
      {keys:['vector','magnitude'],resp:this.kb['vectors']},
      {keys:['log','logarithm'],resp:this.kb['logarithm']},
      {keys:['differentiat','integrat','calculus'],resp:this.kb['calculus']},
      {keys:['mean','median','mode','average'],resp:this.kb['statistics']},
      {keys:['trig','sin','cos','tan','angle'],resp:this.kb['trigonometry']},
      {keys:['pythagoras','hypotenuse','right triangle'],resp:this.kb['pythagoras']},
      {keys:['exam','prepare','revision','revise','tips'],resp:this.kb['study']},
      {keys:['kcse'],resp:this.kb['kcse']},
      {keys:['kcpe','primary'],resp:this.kb['kcpe']},
      {keys:['cbc','competency'],resp:this.kb['cbc']},
      {keys:['ib','baccalaureate','diploma'],resp:this.kb['ib']},
      {keys:['career','job','work','profession'],resp:this.kb['career']},
      {keys:['university','college','kuccps','course selection'],resp:this.kb['university']},
      {keys:['bonjour','parler','french','français','conjugat'],resp:this.kb['french']},
      {keys:['hola','spanish','español','hablar'],resp:this.kb['spanish']},
      {keys:['german','deutsch','hallo','guten'],resp:this.kb['german']},
      {keys:['mandarin','chinese','nihao','你好'],resp:this.kb['mandarin']},
      {keys:['arabic','salaam','quran','عربي'],resp:this.kb['arabic']},
      {keys:['geography','map','contour','climate','weather','erosion'],resp:this.kb['geography']},
      {keys:['colonial','independence','mau mau','kenyatta','history','world war'],resp:this.kb['history']},
    ];
    for(const p of patterns){
      if(p.keys.some(k=>ql.includes(k))&&p.resp){
        const r=Array.isArray(p.resp)?p.resp[0]:p.resp;
        this.memory.push({role:'ai',text:r});return r
      }
    }

    // 3. Conversational responses
    if(ql.match(/^(hi|hello|hey|good morning|good afternoon|good evening|sup|habari|sasa|niaje)/))return'Hello! 👋 I\'m your EduFana AI study partner. I can help you with <b>any subject</b> across CBC, 8-4-4, and IB curricula.\n\nTry asking me:\n• "Explain photosynthesis"\n• "How do I solve quadratic equations?"\n• "Teach me French basics"\n• "What career suits me if I like Maths?"\n• "Help me prepare for KCSE"\n\nWhat would you like to learn today?';
    if(ql.match(/thank|thanks|asante|merci|gracias|danke/))return'You\'re welcome! 😊 I\'m always here to help. Keep studying hard — consistency beats intensity every time. Feel free to ask me anything else!';
    if(ql.match(/who are you|what are you|your name/))return'I\'m <b>EduFana AI</b> — your personal study assistant! 🤖\n\nI\'m trained on CBC, 8-4-4, and IB curricula across all subjects including:\n• Mathematics, Physics, Chemistry, Biology\n• English, Kiswahili, French, Spanish, German, Mandarin, Arabic\n• History, Geography, Business Studies\n• Career guidance and exam preparation\n\nI give detailed, step-by-step explanations with examples. Think of me as a tutor who\'s available 24/7!\n\nWhat would you like to learn?';
    if(ql.match(/help|what can you do|how do you work/))return'I can help you with:\n\n📐 <b>Mathematics:</b> Algebra, Trigonometry, Calculus, Statistics, Vectors\n🧬 <b>Sciences:</b> Biology, Chemistry, Physics — concepts, formulas, experiments\n📖 <b>Languages:</b> English, Kiswahili, French, Spanish, German, Mandarin, Arabic\n🌍 <b>Humanities:</b> History, Geography, Business, Economics\n📝 <b>Exam Prep:</b> KCPE, KCSE, IB strategies and past paper tips\n💼 <b>Career:</b> Which subjects lead to which careers, salary info\n📚 <b>Study Skills:</b> Memory techniques, time management, revision strategies\n\nJust ask your question naturally — like you\'d ask a teacher!';
    if(ql.includes('joke')||ql.includes('funny'))return'Why did the biology teacher break up with the physics teacher?\n\nBecause there was no <b>chemistry</b> between them! 😄\n\nOkay, back to studying! What subject do you need help with?';
    if(ql.includes('motivat')||ql.includes('discouraged')||ql.includes('fail')||ql.includes('hard')||ql.includes('difficult')||ql.includes('stressed'))return'<b>You\'ve got this! 💪</b>\n\nRemember:\n• Every expert was once a beginner\n• Making mistakes means you\'re learning\n• Small daily progress beats occasional cramming\n• You don\'t have to be perfect — just keep going\n\n<b>Practical tips for tough times:</b>\n1. Break big tasks into tiny steps\n2. Celebrate small wins\n3. Study with a friend\n4. Take breaks — rest is productive\n5. Ask for help — that\'s strength, not weakness\n\n"Education is the most powerful weapon which you can use to change the world." — Nelson Mandela\n\nWhat subject is giving you trouble? Let me help you break it down!';

    // 4. Subject detection
    const subjectHints={
      'math':['quadratic','algebra','equation','formula','calculus','geometry','graph','percentage','fraction','ratio','angle','triangle','circle'],
      'bio':['cell','plant','animal','organ','blood','heart','respiration','photosynthesis','gene','dna','ecology','enzyme','digestion'],
      'chem':['element','compound','reaction','acid','base','atom','molecule','bond','electron','periodic table','mole','ion','salt'],
      'phys':['force','energy','wave','light','sound','electricity','magnet','motion','speed','velocity','acceleration','gravity','pressure'],
      'eng':['grammar','tense','essay','composition','comprehension','verb','noun','adjective','sentence','paragraph','literature','poem']
    };
    for(const[subj,hints] of Object.entries(subjectHints)){
      if(hints.some(h=>ql.includes(h))){
        const subMap={'math':'mathematics','bio':'biology','chem':'chemistry','phys':'physics','eng':'english'};
        return`Good question about <b>${subMap[subj]||subj}</b>! Let me help.\n\n${this.kb[Object.keys(this.kb).find(k=>ql.includes(k))]?.[0]||'Could you be more specific about what you\'d like to know? For example:\n• "Explain [specific topic]"\n• "How do I solve [type of problem]?"\n• "What is [concept]?"\n\nThe more specific your question, the better I can help!'}`
      }
    }

    // 5. Default — intelligent fallback
    const fallbacks=[
      'That\'s a great question! I want to give you the best answer possible.\n\nCould you tell me:\n1. <b>Which subject</b> is this about? (Maths, Science, Languages, etc.)\n2. <b>Which curriculum</b> are you following? (CBC, 8-4-4, IB)\n3. <b>What grade/form</b> are you in?\n\nThe more specific you are, the more detailed and helpful my answer will be!',
      'I\'d love to help with that! To give you the most accurate answer, could you:\n\n• Rephrase with the <b>subject name</b> (e.g., "In Chemistry, explain...")\n• Mention a <b>specific topic</b> (e.g., "quadratic equations", "cell biology")\n• Tell me if it\'s for <b>KCSE, KCPE, or IB</b>\n\nI have deep knowledge across all subjects — just point me in the right direction! 📚',
      'I can see you\'re eager to learn! 🌟 Here are some things I\'m really good at explaining:\n\n📐 <b>Maths:</b> "Solve x² + 5x + 6 = 0"\n🧬 <b>Biology:</b> "Explain mitosis vs meiosis"\n⚗️ <b>Chemistry:</b> "What is the periodic table?"\n⚛️ <b>Physics:</b> "Explain Newton\'s laws"\n🇫🇷 <b>French:</b> "Teach me French verbs"\n💼 <b>Career:</b> "What career suits Maths and Physics?"\n📝 <b>Exams:</b> "How to prepare for KCSE"\n\nPick any topic and I\'ll give you a detailed lesson!'
    ];
    const r=fallbacks[Math.floor(Math.random()*fallbacks.length)];
    this.memory.push({role:'ai',text:r});return r
  }
};

<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">${[
{l:'Students',v:students.length,i:'👨‍🎓',c:'bg-blue-50 text-blue-700'},
{l:'Teachers',v:teachers.filter(t=>t.verified).length,i:'👩‍🏫',c:'bg-green-50 text-green-700'},
{l:'Pending',v:pending.length,i:'⏳',c:'bg-yellow-50 text-yellow-700'},
{l:'Posts',v:posts.length,i:'💬',c:'bg-purple-50 text-purple-700'},
{l:'Revenue',v:'KSh '+tot.toLocaleString(),i:'💰',c:'bg-emerald-50 text-emerald-700'},
{l:'Reviews',v:rev.length,i:'⭐',c:'bg-orange-50 text-orange-700'},
].map(s=>`<div class="${s.c} rounded-xl p-4 text-center"><div class="text-xl">${s.i}</div><p class="text-2xl font-extrabold">${s.v}</p><p class="text-xs opacity-70">${s.l}</p></div>`).join('')}</div>
<div class="grid md:grid-cols-2 gap-6"><div class="card p-5"><h3 class="font-bold mb-3">Recent Activity</h3>${nf.slice(0,5).map(n=>`<div class="flex gap-2 pb-2 border-b last:border-0 mb-2"><span class="${n.read?'opacity-30':''}">🔵</span><div><p class="text-sm font-medium">${n.title}</p><p class="text-xs text-gray-500">${n.msg}</p></div></div>`).join('')||'<p class="text-sm text-gray-400">No activity yet</p>'}</div><div class="card p-5"><h3 class="font-bold mb-3">System Info</h3><div class="space-y-2 text-sm"><div class="flex justify-between"><span class="text-gray-500">Version</span><b>${V}</b></div><div class="flex justify-between"><span class="text-gray-500">Curricula</span><b>3 (CBC, 8-4-4, IB)</b></div><div class="flex justify-between"><span class="text-gray-500">Total Subjects</span><b>${allSubjects().length}</b></div><div class="flex justify-between"><span class="text-gray-500">Career Paths</span><b>${CAREERS.length}</b></div><div class="flex justify-between"><span class="text-gray-500">Top Schools</span><b>${SCHOOLS.length}</b></div></div></div></div></div>`;
}}

// ══════════════════════════════════════
// TEACHER PAGES
// ══════════════════════════════════════
function pgTeacher(p){const u=S.get('user');if(!u.verified)return`<div class="max-w-md mx-auto px-4 py-20 text-center fade"><div class="text-6xl mb-5">⏳</div><h2 class="text-2xl font-bold mb-3">Application Under Review</h2><p class="text-gray-500">The admin will review and approve your account within 24 hours. You'll be notified.</p></div>`;
switch(p){
case'tcourses':return`<div class="max-w-4xl mx-auto px-4 py-8 fade"><h1 class="text-3xl font-extrabold mb-6">📚 My Content</h1><p class="text-gray-500 mb-6">Your teaching materials will appear here once you create lessons.</p><div class="card p-10 text-center text-gray-400"><p class="text-4xl mb-3">📹</p><p>Video lesson creation coming soon!</p><p class="text-sm mt-2">For now, participate in community discussions to help students.</p></div></div>`;
case'tearn':return`<div class="max-w-3xl mx-auto px-4 py-8 fade"><h1 class="text-3xl font-extrabold mb-6">💰 Earnings</h1><div class="bg-emerald-50 border border-emerald-200 rounded-xl p-8 text-center"><p class="text-4xl font-extrabold text-emerald-700">KSh 0</p><p class="text-emerald-600 mt-2">Earnings will appear once students subscribe (${C.share}% share).</p></div></div>`;
default:return`<div class="max-w-5xl mx-auto px-4 py-8 fade"><h1 class="text-3xl font-extrabold mb-2">Welcome, ${u.name}! 👩‍🏫</h1><p class="text-gray-500 mb-6">${u.school?'School: '+u.school:''} ${u.subjects?'· Subjects: '+u.subjects:''}</p><div class="grid md:grid-cols-3 gap-5 mb-8"><div class="bg-blue-50 rounded-xl p-5 text-center"><p class="text-3xl font-bold text-blue-700">0</p><p class="text-sm text-gray-600">Lessons</p></div><div class="bg-green-50 rounded-xl p-5 text-center"><p class="text-3xl font-bold text-green-700">0</p><p class="text-sm text-gray-600">Students</p></div><div class="bg-purple-50 rounded-xl p-5 text-center"><p class="text-3xl font-bold text-purple-700">KSh 0</p><p class="text-sm text-gray-600">Earnings</p></div></div><div class="card p-6"><h3 class="font-bold mb-3">💬 Help Students in Community</h3><p class="text-gray-500 text-sm">Visit the community forum to answer student questions and build your reputation.</p></div></div>`;
}}

// ══════════════════════════════════════
// EVENT HANDLERS
// ══════════════════════════════════════
function bind(){
const bl=document.getElementById('bl');if(bl)bl.onclick=()=>{const e=document.getElementById('le').value.trim(),p=document.getElementById('lp').value;if(!e||!p){toast('Please fill all fields','error');return}
if(e===C.admin&&p===C.adminPass){S.set('user',{id:'admin',name:'Admin',email:'admin@edufana.com',role:'admin',av:'👑'});go('adash');toast('Welcome Admin!','success');return}
const t=D.g('users').find(u=>u.email===e);if(t){if(t.password&&t.password!==p){toast('Wrong password','error');return}S.set('user',t);go(t.role==='teacher'?'tdash':'dash');toast('Welcome back, '+t.name+'!','success');return}
toast('Account not found. Please sign up first.','error')};

const bs=document.getElementById('bs');if(bs)bs.onclick=()=>{const n=document.getElementById('sn').value.trim(),e=document.getElementById('se').value.trim(),p=document.getElementById('sw').value,pl=document.getElementById('sl').value,cu=document.getElementById('sc').value;if(!n||!e||!p){toast('Please fill required fields','error');return}if(p.length<6){toast('Password must be at least 6 characters','error');return}if(D.g('users').find(u=>u.email===e)){toast('Email already registered','error');return}
const u=D.a('users',{name:n,email:e,password:p,role:'student',plan:pl,curriculum:cu,av:n[0],verified:true});
D.a('notifs',{to:'admin',title:'📩 New Student',msg:`${n} (${e}) registered — ${pl} plan, ${cu.toUpperCase()} curriculum`,read:false,at:new Date().toISOString()});
const prices={basic:300,premium:500,advanced:800};if(prices[pl])D.a('transactions',{name:n,plan:pl,amt:prices[pl],at:new Date().toISOString()});
S.set('user',u);go('dash');toast('Welcome to EduFana, '+n+'! 🎉','success')};

const bt=document.getElementById('bt');if(bt)bt.onclick=()=>{const n=document.getElementById('tn').value.trim(),e=document.getElementById('te').value.trim(),p=document.getElementById('tp').value,b=document.getElementById('tb').value.trim(),sc=document.getElementById('ts')?.value.trim()||'',sj=document.getElementById('tj')?.value.trim()||'';if(!n||!e||!p||!b){toast('Please fill required fields','error');return}if(D.g('users').find(u=>u.email===e)){toast('Email already registered','error');return}
const t=D.a('users',{name:n,email:e,password:p,role:'teacher',verified:false,bio:b,school:sc,subjects:sj,av:'👩‍🏫'});
D.a('notifs',{to:'admin',title:'🆕 Teacher Application',msg:`${n} (${e}) from ${sc||'N/A'} applied. Subjects: ${sj||'N/A'}`,read:false,at:new Date().toISOString()});
S.set('user',t);go('tdash');toast('Application submitted! ⏳','success')};
}

// Global functions
function logout(){S.set('user',null);go('landing');toast('Logged out','info')}
function approve(id){D.u('users',id,{verified:true});const t=D.f('users',id);D.a('notifs',{to:id,title:'✅ Approved!',msg:'Your teacher account is approved. Welcome to EduFana!',read:false,at:new Date().toISOString()});toast(t?.name+' approved! ✅','success');render()}
function reject(id){const t=D.f('users',id);D.r('users',id);toast((t?.name||'Teacher')+' rejected','error');render()}
function markAllRead(){const n=D.g('notifs');n.forEach(x=>{if(x.to==='admin')x.read=true});D.s('notifs',n);toast('All read','success');render()}
function switchCur(c){const u=S.get('user');u.curriculum=c;S.set('user',u);D.u('users',u.id,{curriculum:c});go('subjects');toast('Switched to '+CURRICULA[c].name,'success')}
function addPost(subject,icon){const tx=document.getElementById('newpost')?.value.trim();if(!tx){toast('Write something first','error');return}const u=S.get('user');D.a('posts',{subject,subjectIcon:icon,content:tx,authorName:u.name,authorId:u.id,likes:0,replies:[]});toast('Posted! 🎉','success');render()}
function likePost(id){const posts=D.g('posts');const p=posts.find(x=>x.id===id);if(p){p.likes=(p.likes||0)+1;D.s('posts',posts);render()}}
function replyTo(id){const tx=prompt('Your reply:');if(!tx)return;const u=S.get('user'),posts=D.g('posts'),p=posts.find(x=>x.id===id);if(p){if(!p.replies)p.replies=[];p.replies.push({author:u.name,text:tx,at:new Date().toISOString()});D.s('posts',posts);toast('Reply posted!','success');render()}}
function deletePost(id){D.r('posts',id);toast('Post deleted','success');render()}
function aiChat(){const inp=document.getElementById('aim'),m=inp.value.trim();if(!m)return;inp.value='';const ch=document.getElementById('chat');
// User message
ch.innerHTML+=`<div class="flex gap-3 justify-end"><div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-2xl rounded-tr-none p-3 max-w-md text-sm shadow">${m}</div><div class="avatar bg-blue-100 text-blue-600 w-8 h-8 text-xs flex-shrink-0">${S.get('user')?.name?.[0]||'?'}</div></div>`;
ch.scrollTop=ch.scrollHeight;
// Typing indicator
const typingId='typing_'+Date.now();
ch.innerHTML+=`<div id="${typingId}" class="flex gap-3"><div class="avatar bg-gradient-to-br from-blue-500 to-purple-600 text-white w-8 h-8 text-xs flex-shrink-0">🤖</div><div class="bg-blue-50 rounded-2xl rounded-tl-none p-4 text-sm text-gray-400"><span class="inline-flex gap-1"><span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0s"></span><span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:.15s"></span><span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:.3s"></span></span> Thinking...</div></div>`;
ch.scrollTop=ch.scrollHeight;
// AI response with delay
const reply=AI.answer(m);
const delay=Math.min(400+reply.length*2,2000);
setTimeout(()=>{const te=document.getElementById(typingId);if(te)te.remove();ch.innerHTML+=`<div class="flex gap-3 fade"><div class="avatar bg-gradient-to-br from-blue-500 to-purple-600 text-white w-8 h-8 text-xs flex-shrink-0">🤖</div><div class="bg-blue-50 border border-blue-100 rounded-2xl rounded-tl-none p-4 flex-1 text-sm text-gray-700 leading-relaxed whitespace-pre-line">${reply}</div></div>`;ch.scrollTop=ch.scrollHeight},delay)}

// ═══ INIT ═══
// Clear old data if version changed
try{const ov=localStorage.getItem('ef2_ver');if(ov!==V){localStorage.clear();localStorage.setItem('ef2_ver',V)}}catch(e){}
S.ld();seed();render();
</script>
