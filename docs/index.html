  { keys: ["half-life", "radioactive decay", "decay"], response: "⚛️ **Half-Life & Radioactive Decay:**\n\n**Half-life (t½)** = time for half the radioactive nuclei in a sample to decay.\n\n**Formula:** N = N₀ × (½)^(t/t½)\n\n**Where:**\n• N = remaining amount\n• N₀ = initial amount  \n• t = elapsed time\n• t½ = half-life\n\n**Example:** 100g of Carbon-14 (t½ = 5730 yrs)\n• After 5730 yrs → 50g\n• After 11,460 yrs → 25g\n• After 17,190 yrs → 12.5g\n\n**Applications:** Carbon dating, medical imaging, nuclear power" },
  { keys: ["photosynthesis", "plant", "chlorophyll"], response: "🌿 **Photosynthesis:**\n\n**Equation:** 6CO₂ + 6H₂O + light → C₆H₁₂O₆ + 6O₂\n\n**Process:** Plants use sunlight, water, and CO₂ to make glucose and oxygen.\n\n**Key Facts:**\n• Occurs in chloroplasts (contain chlorophyll)\n• Two stages: Light reactions + Calvin cycle\n• Light reactions produce ATP and NADPH\n• Calvin cycle uses these to make glucose\n• Happens in mesophyll cells of leaves\n\n**Factors affecting rate:** Light intensity, CO₂ concentration, temperature" },

  { keys: ["career", "job", "future", "profession"], response: "🚀 **Career Guidance:**\n\nYour career depends on your interests, skills, and subjects. Here are top paths:\n\n• **Medicine** — Biology, Chemistry, Physics\n• **Engineering** — Maths, Physics, Computer Science\n• **Law** — English, History, Government\n• **Data Science/AI** — Maths, Computer Science\n• **Teaching** — Any subject you love!\n• **Business** — Maths, Business Studies, Economics\n\nOn Edufana, explore our **Career Pathways** section for detailed roadmaps. What subjects do you enjoy most?" },
  { keys: ["study", "exam", "tip", "prepare"], response: "📚 **Study Tips for Success:**\n\n1. **Active Recall** — Test yourself, don't just re-read\n2. **Spaced Repetition** — Review at increasing intervals\n3. **Pomodoro Technique** — 25 min study, 5 min break\n4. **Teach Others** — Explain concepts to solidify understanding\n5. **Practice Past Papers** — Especially for KCSE, GCSE, A-Levels\n6. **Mind Maps** — Visual organization of concepts\n7. **Sleep Well** — 7-8 hours for memory consolidation\n8. **Stay Healthy** — Exercise, eat well, drink water\n\n**Exam Day Tips:** Read questions carefully, manage time, start with easy ones first." },

const getAIResponse = (input) => {
  const lower = input.toLowerCase();
  let bestMatch = null;
  let bestScore = 0;
  for (const item of AI_KB) {
    for (const key of item.keys) {
      if (lower.includes(key)) {
        if (key.length > bestScore) { bestScore = key.length; bestMatch = item; }
      }
    }
  }
  if (bestMatch) return bestMatch.response;
  return "That's a great question! 🤔 While I'm still learning about that specific topic, here are some things I can help with:\n\n• 📚 **Curricula** — CBC, 8-4-4, British Baccalaureate\n• 🔬 **Sciences** — Biology, Chemistry, Physics\n• 📐 **Mathematics** — Algebra, Geometry, Calculus\n• 💼 **Careers** — Career pathways and guidance\n• 🌍 **Languages** — 8 foreign languages\n• 📝 **Study tips** — Exam preparation\n\nTry asking about any of these topics!";
};

const Modal = ({ open, onClose, children }) => {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="p-6">{children}</div>
      </div>
    </div>
  );
};

const Toast = ({ message, type, onClose }) => {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, [onClose]);
  return (
    <div className={`fixed bottom-6 right-6 z-[60] px-5 py-3 rounded-xl shadow-xl text-white font-medium flex items-center gap-2 animate-slide-up ${type === "success" ? "bg-emerald-500" : "bg-rose-500"}`}>
      {type === "success" ? <Icon name="check" className="w-4 h-4" /> : <Icon name="close" className="w-4 h-4" />}
      {message}
    </div>
  );
};

const Input = ({ label, type, value, onChange, placeholder, required }) => (
  <div>
    {label && <label className="block text-sm font-medium text-slate-700 mb-1.5">{label}</label>}
    <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} required={required}
      className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-violet-400 focus:ring-2 focus:ring-violet-100 outline-none transition bg-white/70" />
  </div>
);

const Stars = ({ score, size = "w-4 h-4" }) => (
  <span className="inline-flex gap-0.5">
    {[1,2,3,4,5].map(i => <Icon key={i} name={i <= score ? "star" : "starEmpty"} className={`${size} ${i <= score ? "text-amber-400" : "text-slate-200"}`} />)}

);

// SOCIAL FEED PAGE
const SocialFeed = ({ user, posts, addPost, addComment, likePost }) => {
  const [newPost, setNewPost] = useState("");
  const [newPostSubject, setNewPostSubject] = useState("General");
  const [expandedPost, setExpandedPost] = useState(null);
  const [comment, setComment] = useState("");
  const [filter, setFilter] = useState("all");

  const allSubjects = [...new Set(Object.values(CURRICULA).flatMap(c => c.subjects)), "General", "Languages"];

  const filteredPosts = filter === "all" ? posts : posts.filter(p => p.subject === filter);

  const handlePost = () => {
    if (!newPost.trim() || !user) return;
    addPost(newPost, newPostSubject);
    setNewPost("");
  };

  const handleComment = (postId) => {
    if (!comment.trim()) return;
    addComment(postId, comment);
    setComment("");
  };

  return (
    <div className="space-y-6 pt-4 max-w-3xl mx-auto">
      <div className="text-center">
        <h2 className="text-3xl md:text-4xl font-bold">💬 Learning Community</h2>
        <p className="text-slate-500 mt-2">Connect with learners, share knowledge, ask questions</p>
      </div>

      {user && (
        <div className="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
          <div className="flex gap-3">
            <div className="w-11 h-11 rounded-full bg-gradient-to-br from-violet-500 to-indigo-500 text-white flex items-center justify-center font-bold flex-shrink-0">
              {user.name.split(' ').map(n => n[0]).slice(0,2).join('').toUpperCase()}
            </div>
            <div className="flex-1">
              <textarea value={newPost} onChange={e => setNewPost(e.target.value)} placeholder={`What are you learning today, ${user.name.split(' ')[0]}?`} rows={2} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-violet-400 outline-none resize-none" />
              <div className="flex items-center justify-between mt-2">
                <select value={newPostSubject} onChange={e => setNewPostSubject(e.target.value)} className="px-3 py-1.5 rounded-lg border border-slate-200 text-sm">
                  {allSubjects.slice(0, 20).map(s => <option key={s}>{s}</option>)}
                </select>
                <button onClick={handlePost} className="bg-gradient-to-r from-violet-600 to-indigo-600 text-white px-5 py-2 rounded-xl text-sm font-medium hover:from-violet-700 hover:to-indigo-700 transition flex items-center gap-1">
                  <Icon name="send" className="w-4 h-4" /> Post
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Filter */}
      <div className="flex gap-2 overflow-x-auto pb-2">
        <button onClick={() => setFilter("all")} className={`px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap ${filter === "all" ? "bg-violet-600 text-white" : "bg-white border border-slate-200 text-slate-600"}`}>All Posts</button>
        {["Mathematics", "Physics", "Chemistry", "Biology", "English", "History", "General", "Languages"].map(s => (
          <button key={s} onClick={() => setFilter(s)} className={`px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap ${filter === s ? "bg-violet-600 text-white" : "bg-white border border-slate-200 text-slate-600"}`}>{s}</button>
        ))}
      </div>

      {/* Posts */}
      {filteredPosts.length === 0 ? (
        <div className="text-center py-16">
          <div className="text-6xl mb-4">💬</div>
          <h3 className="text-xl font-bold">Be the First to Post!</h3>
          <p className="text-slate-500 mt-2">This community is brand new. Start a conversation and inspire others.</p>
        </div>
      ) : filteredPosts.map(p => (
        <div key={p.id} className="bg-white rounded-2xl p-5 border border-slate-200 hover:shadow-md transition">
          <div className="flex items-center gap-3 mb-3">
            <div className="w-11 h-11 rounded-full bg-gradient-to-br from-violet-500 to-indigo-500 text-white flex items-center justify-center font-bold">{p.author.split(' ').map(n => n[0]).slice(0,2).join('').toUpperCase()}</div>
            <div>
              <div className="font-semibold">{p.author}</div>
              <div className="text-xs text-slate-400">{new Date(p.timestamp).toLocaleDateString()} · <span className="text-violet-600 font-medium">{p.subject}</span></div>
            </div>
          </div>
          <p className="text-slate-700 mb-3">{p.content}</p>
          <div className="flex items-center gap-4 text-sm text-slate-500 border-t border-slate-100 pt-3">
            <button onClick={() => likePost(p.id)} className={`flex items-center gap-1 hover:text-rose-500 transition ${p.liked ? 'text-rose-500' : ''}`}>
              <Icon name={p.liked ? "heartFill" : "heart"} className="w-4 h-4" /> {p.likes}
            </button>
            <button onClick={() => setExpandedPost(expandedPost === p.id ? null : p.id)} className="flex items-center gap-1 hover:text-violet-500 transition">
              <Icon name="comment" className="w-4 h-4" /> {p.comments.length}
            </button>
            <button className="flex items-center gap-1 hover:text-blue-500 transition">
              <Icon name="share" className="w-4 h-4" /> Share
            </button>
          </div>
          {expandedPost === p.id && (
            <div className="mt-4 pt-4 border-t border-slate-100 space-y-3">
              {p.comments.map(c => (
                <div key={c.id} className="flex gap-2">
                  <div className="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 to-teal-400 text-white flex items-center justify-center text-xs font-bold flex-shrink-0">{c.author.split(' ').map(n => n[0])[0].toUpperCase()}</div>
                  <div className="flex-1 bg-slate-50 rounded-xl p-3">
                    <div className="text-sm font-medium">{c.author} <span className="text-xs text-slate-400 font-normal">{new Date(c.timestamp).toLocaleDateString()}</span></div>
                    <div className="text-sm text-slate-600">{c.text}</div>
                  </div>
                </div>
              ))}
              {user && (
                <div className="flex gap-2">
                  <input value={comment} onChange={e => setComment(e.target.value)} placeholder="Add a comment..." className="flex-1 px-4 py-2 rounded-xl border border-slate-200 focus:border-violet-400 outline-none text-sm" />
                  <button onClick={() => handleComment(p.id)} className="bg-violet-600 text-white px-4 py-2 rounded-xl text-sm hover:bg-violet-700 transition">
                    <Icon name="send" className="w-4 h-4" />
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      ))}
    </div>
  );
};

              <NavBtn target="careers" icon="rocket" label="Careers" />
              <NavBtn target="login" icon="user" label="Login" />
              <button onClick={() => setPage("register")} className="ml-2 bg-gradient-to-r from-violet-600 to-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-medium hover:from-violet-700 hover:to-indigo-700 shadow-lg shadow-violet-200 transition">Get Started</button>
            </>}
            {user && <>
              <NavBtn target="feed" icon="chat" label="Feed" />
              <NavBtn target="curricula" icon="graduation" label="Curricula" />
              <NavBtn target="languages" icon="globe" label="Languages" />
              <NavBtn target="schools" icon="award" label="Schools" />
              <NavBtn target="careers" icon="rocket" label="Careers" />
              <button onClick={() => setShowAI(!showAI)} className="px-3 py-2 rounded-xl text-sm bg-gradient-to-r from-violet-500 to-indigo-500 text-white font-medium shadow-lg shadow-violet-200 flex items-center gap-1">
                🤖 AI
              </button>
              <div className="flex items-center gap-2 ml-2 pl-3 border-l border-slate-200">
                <div className="w-8 h-8 rounded-full bg-gradient-to-br from-violet-500 to-indigo-500 text-white flex items-center justify-center text-xs font-bold">
                  {user.name.split(' ').map(n => n[0]).slice(0,2).join('').toUpperCase()}
                </div>
                <button onClick={logout} className="text-slate-400 hover:text-rose-500 transition"><Icon name="logout" className="w-4 h-4" /></button>
              </div>
            </>}
          </div>
          <button className="lg:hidden p-2" onClick={() => setMobileMenu(!mobileMenu)}>
            <Icon name="menu" className="w-6 h-6 text-slate-600" />
          </button>
        </div>
        {mobileMenu && (
          <div className="lg:hidden bg-white border-t border-slate-100 px-4 py-3 space-y-2 shadow-lg">
            {!user ? (
              <>
                <button onClick={() => { setPage("home"); setMobileMenu(false); }} className="block w-full text-left px-4 py-2.5 rounded-xl text-sm hover:bg-violet-50">🏠 Home</button>
                <button onClick={() => { setPage("curricula"); setMobileMenu(false); }} className="block w-full text-left px-4 py-2.5 rounded-xl text-sm hover:bg-violet-50">🎓 Curricula</button>
                <button onClick={() => { setPage("languages"); setMobileMenu(false); }} className="block w-full text-left px-4 py-2.5 rounded-xl text-sm hover:bg-violet-50">🌍 Languages</button>
                <button onClick={() => { setPage("schools"); setMobileMenu(false); }} className="block w-full text-left px-4 py-2.5 rounded-xl text-sm hover:bg-violet-50">🏫 Top Schools</button>
                <button onClick={() => { setPage("careers"); setMobileMenu(false); }} className="block w-full text-left px-4 py-2.5 rounded-xl text-sm hover:bg-violet-50">🚀 Careers</button>
                <button onClick={() => { setPage("login"); setMobileMenu(false); }} className="block w-full text-left px-4 py-2.5 rounded-xl text-sm hover:bg-violet-50">👤 Login</button>
              </>
            ) : (
              <>
                <button onClick={() => { setPage("feed"); setMobileMenu(false); }} className="block w-full text-left px-4 py-2.5 rounded-xl text-sm hover:bg-violet-50">💬 Community Feed</button>
                <button onClick={() => { setPage("curricula"); setMobileMenu(false); }} className="block w-full text-left px-4 py-2.5 rounded-xl text-sm hover:bg-violet-50">🎓 Curricula</button>
                <button onClick={() => { setPage("languages"); setMobileMenu(false); }} className="block w-full text-left px-4 py-2.5 rounded-xl text-sm hover:bg-violet-50">🌍 Languages</button>
                <button onClick={() => { setPage("schools"); setMobileMenu(false); }} className="block w-full text-left px-4 py-2.5 rounded-xl text-sm hover:bg-violet-50">🏫 Schools</button>
                <button onClick={() => { setPage("careers"); setMobileMenu(false); }} className="block w-full text-left px-4 py-2.5 rounded-xl text-sm hover:bg-violet-50">🚀 Careers</button>
                <button onClick={() => { setShowAI(true); setMobileMenu(false); }} className="block w-full text-left px-4 py-2.5 rounded-xl text-sm hover:bg-violet-50">🤖 AI Tutor</button>
                <button onClick={() => { logout(); setMobileMenu(false); }} className="block w-full text-left px-4 py-2.5 rounded-xl text-sm text-rose-500 hover:bg-rose-50">Logout</button>
              </>
            )}
          </div>
        )}
      </nav>

      {/* MAIN */}
      <main className="max-w-6xl mx-auto px-4 py-8">
        {page === "home" && <HomePage setPage={setPage} />}
        {page === "curricula" && <CurriculaPage />}
        {page === "languages" && <LanguagesPage setPage={setPage} />}
        {page === "schools" && <SchoolsPage />}
        {page === "careers" && <CareerPage />}
        {page === "feed" && <SocialFeed user={user} posts={posts} addPost={addPost} addComment={addComment} likePost={likePost} />}
        {page === "login" && (
          <div className="max-w-md mx-auto pt-12">
            <div className="glass rounded-2xl p-8 border border-slate-200/60 shadow-xl">
              <div className="text-center mb-6">
                <div className="w-14 h-14 mx-auto bg-gradient-to-br from-violet-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">E</div>
                <h2 className="text-2xl font-bold mt-3">Welcome Back</h2>
                <p className="text-slate-500 text-sm">Join the social learning revolution</p>
              </div>
              <form onSubmit={handleLogin} className="space-y-4">
                <Input label="Email" type="email" value={le} onChange={setLe} placeholder="you@example.com" required />
                <Input label="Password" type="password" value={lp} onChange={setLp} placeholder="••••••••" required />
                <button type="submit" className="w-full bg-gradient-to-r from-violet-600 to-indigo-600 text-white py-3 rounded-xl font-medium hover:from-violet-700 hover:to-indigo-700 transition">Log In</button>
              </form>
              <p className="text-xs text-slate-400 text-center mt-4">New here? <button onClick={() => setPage("register")} className="text-violet-600 font-medium hover:underline">Create account</button></p>
            </div>
          </div>
        )}
        {page === "register" && (
          <div className="max-w-md mx-auto pt-8">
            <div className="glass rounded-2xl p-8 border border-slate-200/60 shadow-xl">
              <div className="text-center mb-6">
                <div className="w-14 h-14 mx-auto bg-gradient-to-br from-violet-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">E</div>
                <h2 className="text-2xl font-bold mt-3">Join Edufana</h2>
                <p className="text-slate-500 text-sm">Be among the first learners</p>
              </div>
              <form onSubmit={handleRegister} className="space-y-4">
                <Input label="Full Name" type="text" value={rn} onChange={setRn} placeholder="Your name" required />
                <Input label="Email" type="email" value={re} onChange={setRe} placeholder="you@example.com" required />
                <Input label="Password" type="password" value={rp} onChange={setRp} placeholder="Create a password" required />
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1.5">I am a</label>
                  <div className="grid grid-cols-2 gap-3">
                    <button type="button" onClick={() => setRrole("student")} className={`px-4 py-3 rounded-xl border text-sm font-medium transition ${rrole === "student" ? "bg-violet-100 border-violet-300 text-violet-700" : "border-slate-200 text-slate-500 hover:border-violet-200"}`}>🎓 Student</button>
                    <button type="button" onClick={() => setRrole("teacher")} className={`px-4 py-3 rounded-xl border text-sm font-medium transition ${rrole === "teacher" ? "bg-violet-100 border-violet-300 text-violet-700" : "border-slate-200 text-slate-500 hover:border-violet-200"}`}>👨‍ Teacher</button>
                  </div>
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1.5">I follow</label>
                  <div className="grid grid-cols-3 gap-2">
                    {Object.entries(CURRICULA).map(([key, c]) => (
                      <button key={key} type="button" onClick={() => setRcurric(key)} className={`px-3 py-2 rounded-xl border text-xs font-medium transition ${rcurric === key ? "bg-violet-100 border-violet-300 text-violet-700" : "border-slate-200 text-slate-500 hover:border-violet-200"}`}>
                        {c.flag} {c.name.split(' ')[0]}
                      </button>
                    ))}
                  </div>
                </div>
                <button type="submit" className="w-full bg-gradient-to-r from-violet-600 to-indigo-600 text-white py-3 rounded-xl font-medium hover:from-violet-700 hover:to-indigo-700 transition">Create Account</button>
                <p className="text-xs text-slate-400 text-center">🎁 Early members get premium features free for life</p>
              </form>
            </div>
          </div>
        )}
      </main>

      {/* FOOTER */}
      <footer className="border-t border-slate-200/60 bg-white/40 mt-16">
        <div className="max-w-6xl mx-auto px-4 py-10">
          <div className="grid md:grid-cols-4 gap-8">
            <div>
              <div className="flex items-center gap-2 font-bold text-xl text-violet-700 mb-3">
                <div className="w-8 h-8 bg-gradient-to-br from-violet-600 to-indigo-600 rounded-xl flex items-center justify-center text-white">
                  <Icon name="atom" className="w-4 h-4" />
                </div>
                Edufana
              </div>
              <p className="text-sm text-slate-500">The world's social learning platform covering CBC, 8-4-4, and British curricula.</p>
            </div>
            <div>
              <h4 className="font-semibold mb-3 text-sm">Curricula</h4>
              <div className="space-y-2 text-sm text-slate-500">
                <div>🇰🇪 CBC (Kenya)</div>
                <div>🇰🇪 8-4-4 (Kenya)</div>
                <div>🇬🇧 British Baccalaureate</div>
              </div>
            </div>
            <div>
              <h4 className="font-semibold mb-3 text-sm">Explore</h4>
              <div className="space-y-2 text-sm text-slate-500">
                <button onClick={() => setPage("languages")} className="block hover:text-violet-600">🌍 Foreign Languages</button>
                <button onClick={() => setPage("schools")} className="block hover:text-violet-600">🏫 Top Schools</button>
                <button onClick={() => setPage("careers")} className="block hover:text-violet-600">🚀 Career Pathways</button>
                <button onClick={() => setPage("feed")} className="block hover:text-violet-600">💬 Community</button>
              </div>
            </div>
            <div>
              <h4 className="font-semibold mb-3 text-sm">Contact</h4>
              <div className="space-y-2 text-sm text-slate-500">
                <div>📧 support@edufana.com</div>
                <div> +254 700 000 000</div>
                <div>🌍 Nairobi, Kenya</div>
              </div>
            </div>
          </div>
          <div className="border-t border-slate-200 mt-8 pt-6 text-center text-sm text-slate-500">
            © 2026 Edufana Education · Empowering learners worldwide 🌍
          </div>
        </div>
      </footer>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
